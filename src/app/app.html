<div class="shell">
  <aside class="shell__sidebar">
    <div class="shell__brand">
      <h1 class="shell__title">{{ title }}</h1>
      <p class="shell__subtitle">{{ subtitle }}</p>
    </div>

    <p class="shell__summary">{{ summary }}</p>

    <nav class="shell__nav" aria-label="Primary">
      <a
        *ngFor="let item of navigation"
        class="shell__nav-link"
        [routerLink]="item.route"
        routerLinkActive="shell__nav-link--active"
      >
        <span class="shell__nav-label">{{ item.label }}</span>
        <span class="shell__nav-hint">{{ item.hint }}</span>
      </a>
    </nav>
  </aside>

  <main class="shell__main">
    <header class="shell__header">
      <div>
        <p class="shell__kicker">Operations</p>
        <h2>Simple warehouse control panel</h2>
      </div>
      <div class="shell__badge">
        Dashboard, supplier management, and inventory workflows are available through the local service.
      </div>
    </header>

    <section class="shell__route">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
